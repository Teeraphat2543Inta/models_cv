model_parameters:
  onnx_model: "/open_explorer/models/onnx/osnet_reid.onnx"
  output_model_file_prefix: "osnet_reid"
  march: "bayes-e"

input_parameters:
  input_name: "base_image"
  input_shape: "1x3x256x128"
  input_type_rt: "nv12"
  input_layout_rt: "NHWC"
  input_type_train: "rgb"
  input_layout_train: "NCHW"
  norm_type: "data_scale"
  scale_value: 0.003921568627

calibration_parameters:
  cal_data_dir: "/open_explorer/data/calibration_processed_256x128"
  calibration_type: "default"

compiler_parameters:
  compile_mode: "latency"
  debug: false
  optimize_level: "O3"
